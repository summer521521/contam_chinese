        <h3>
DUCT_FLOW_UPDATE_MSGTYPE
</h3>
        <p>
此消息可能会在之后由 ContamX 发送
 <span style="font-family: &#x27;Courier New&#x27;;">
CX_ADVANCE_MSGTYPE
</span> 
已收到且 ContamX 已提前至指定时间。 ContamX 将仅在相关位的情况下发送此消息
 <code>
选项
</code> 
前一个标志
 <span style="font-family: &#x27;Courier New&#x27;;">
CX_ADVANCE_MSGTYPE
</span> 
已设置。值按照以下提供的顺序发送
 <span style="font-family: &#x27;Courier New&#x27;;">
DUCT_INFO_MSGTYPE
</span>
。  请参阅
 <a href="E_1_Program_Execution.htm">
程序执行
</a> 
部分了解与此消息所使用的单位相关的信息。
</p>

消息头；
</p>
        <p class="code"><span style="color: blue;">int </span>
时间；
 <span style="color: #008100;">
// 数据对应的仿真时间[s]
</span></p>

浮动
 </span>
值[num_ducts]；

// 每个管道段的气流速率 [kg/s] 或 [m3/s]
