        <h3><span style="color: #8b0000;">
ADJ_AHSP_FLOWS_MSGTYPE
</span>
        </h3>
        <p>
在就绪模式下，ContamX 可以随时接收此消息。每条消息均可用于设置 AHS 气流速率。这里使用的 ID 是由
 <span style="font-family: &#x27;Courier New&#x27;;">
AHSP_INFO_MSGTYPE
</span>.</p>
        <p class="code">
消息头；
</p>
        <p class="code"><span style="color: blue;">int </span>
num_ahsp;
&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<span style="color: #008100;">
//要设置的流总数
</span></p>
        <p class="code"><span style="color: blue;">int </span>
id[num_ahsp];
 <span style="color: #008100;">&#160;&#160;&#160;&#160;&#160;
// 要设置的每个 AHS 路径的索引
</span></p>
        <p class="code"><span style="color: blue;">
浮动
 </span>
值[num_ahsp]；
&#160;<span style="color: #008100;">
// 气流速率[kg/s]
</span></p>
