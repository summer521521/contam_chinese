        <h3>
ADJ_CONTROL_NODE_MSGTYPE
</h3>
        <p>

就绪模式

 <i>

</i> (<i>Set</i> 
类型，CT_SET）控制节点，其中
 <code>
节点id
</code> 
是由 ContamX 分配给控制节点并由以下提供的标识符
 <span style="font-family: &#x27;Courier New&#x27;;">
INPUT_CTRL_INFO_MSGTYPE
</span>
。请注意，
 <span style="font-family: &#x27;Courier New&#x27;;font-size: 10pt;"></span><code>
节点id
</code> 
不太可能对应于相应控制图标的 ContamW SketchPad 上显示的控制节点编号。但是，节点名称由以下提供：
 <span style="font-family: &#x27;Courier New&#x27;;">
INPUT_CTRL_INFO_MSGTYPE
</span>.    <![CDATA[ ]></p>
