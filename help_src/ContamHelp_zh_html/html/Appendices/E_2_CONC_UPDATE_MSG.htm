        <h3>
CONC_UPDATE_MSGTYPE
</h3>
        <p>
此消息可能会在之后由 ContamX 发送
 <span style="font-family: &#x27;Courier New&#x27;;">
CX_ADVANCE_MSGTYPE
</span> 
已收到且 ContamX 已提前至指定时间。 ContamX 将仅在相关位的情况下发送此消息
 <code>
选项
</code> 
前一个标志
 <span style="font-family: &#x27;Courier New&#x27;;">
CX_ADVANCE_MSGTYPE
</span> 
已设置。值按照以下提供的顺序发送
   <![CDATA[ ]><span style="font-family: &#x27;Courier New&#x27;;">
ZONE_INFO_MSGTYPE
</span>.</p>
        <p class="code">
消息头；
</p>
        <p class="code"><span style="color: blue;">int </span>
时间；
 <span style="color: #008100;">&#160;&#160;&#160;&#160;
// 数据对应的仿真时间[s]
</span></p>
        <p class="code"><span style="color: blue;">int </span>
代理 ID；
<span style="color: #008100;"> 
// 正在更新的代理的污染物指数
</span></p>
        <p class="code"><span style="color: blue;">
浮动
 </span>
浓度[num_zones]；
<span style="color: #008100;"> 
// 污染物浓度[kg/kg]
</span></p>
