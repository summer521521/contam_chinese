        <h3><a name="kanchor114"></a>
定义居住者
</h3>
        <p>
在 SketchPad 上绘制曝光图标后，您必须使用图标定义过程来定义它（请参阅
 <a href="../SketchPad/IDH_UsingSketchPad_DefiningBuildingComponentIcons.htm">
定义建筑组件图标
</a>
) 显示和编辑属性。这将显示“乘员暴露属性”对话框。下面给出了所有乘员暴露属性的详细描述
 <a href="IDH_UsingOccs_Occupant_Properties.htm">
住户属性
</a> 
部分。定义属性后，图标将显示为黑色。从现在开始，您可以使用此图标访问居住者的属性。
</p>
