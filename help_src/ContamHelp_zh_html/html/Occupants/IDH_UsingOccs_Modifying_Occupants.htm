        <h3><a name="kanchor113"></a>
修改居住者
</h3>
        <p>
要修改占用者的参数，您可以使用图标定义过程（请参见
 <a href="../SketchPad/IDH_UsingSketchPad_DefiningBuildingComponentIcons.htm">
定义建筑组件图标
</a>
) 显示其属性并进行所需的更改。您还可以移动和复制占用者。
</p>
        <p class="SubHeading1">
移动乘员暴露图标
</p>
        <p>
定义占用者后，您可以使用
 <span style="font-weight: bold;">Cu</span><span style="font-weight: bold;text-decoration: underline;">t</span> and <span style="font-weight: bold;text-decoration: underline;">P</span><span style="font-weight: bold;">
阿斯特
</span> 
的职能
 <span style="font-weight: bold;text-decoration: underline;">E</span><span style="font-weight: bold;">dit</span> 
菜单。您可以将乘员暴露图标移动到当前所在层内的任何位置。
</p>
        <p class="SubHeading1">
复制乘员暴露图标
</p>
        <p>
定义占用者后，您可以使用复制图标
 <span style="font-weight: bold;text-decoration: underline;">C</span><span style="font-weight: bold;">opy</span> and <span style="font-weight: bold;text-decoration: underline;">P</span><span style="font-weight: bold;">
阿斯特
</span> 
的职能
 <span style="font-weight: bold;text-decoration: underline;">E</span><span style="font-weight: bold;">dit</span> 
菜单。您可以将占用者复制到项目任何级别的任何空白单元格中。
</p>
