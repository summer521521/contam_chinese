        <h3><a name="kanchor111"></a>
创建居住者
</h3>
        <p>
您可以通过在 SketchPad 上放置一个曝光图标来创建一个占用者（请参阅 <a href="../SketchPad/IDH_UsingSketchPad_DrawingBuildingComponents.htm">
绘制建筑组件图标
</a>
）。您可以将它们放置在 SketchPad 的任何空白单元格中。如果弹出菜单位于 ContamW 不允许放置图标的位置，则“曝光”菜单选项将被禁用（变灰）。
</p>
