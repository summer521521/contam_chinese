        <h3><a name="kanchor115"></a>
住户属性
</h3>
        <p>
本节提供了特定居住者属性的详细描述，包括居住时间表，即随着时间的推移在建筑物内的位置以及与居住者相关的污染物的产生。以下每个小节都是上下文相关的帮助主题，您可以通过按
 <span style="font-weight: bold;">F1</span> 
使用“乘员暴露属性”属性表的属性页时。
</p>
