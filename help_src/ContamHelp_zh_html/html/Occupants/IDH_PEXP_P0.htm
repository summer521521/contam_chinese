        <h4><a name="kanchor116"></a>
占用者 – 占用表属性
</h4>
        <p><span style="font-weight: bold;">
居住人数：
</span>  这是当您突出显示图标时出现在状态栏中的数字。一旦定义，ContamW 会自动将此编号分配给每个曝光图标。当您在项目中添加或删除占用者时，此数字可能会发生变化。每次保存项目时，都会重新分配占用人数。编号从顶层开始分配，从 SketchPad 的左上角开始，从 SketchPad 的从左到右、从上到下移动。
</p>
        <p><span style="font-weight: bold;">

</a>).</p>
