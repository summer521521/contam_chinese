        <h2>
气流分析
</h2>
        <p>
多年来，已经开发了许多方法来计算污染物分析所需的建筑气流。 Feustel 和 Dieris 报告了 50 种不同的用于多房间气流分析的计算机程序 [
<a href="../IDH_References.htm#REF_Feustel_1992">
费斯塔尔和狄里斯 1992
</a>
]。请注意，“房间”在这些程序中还有许多其他名称，例如节点、单元和房间是常见的替代名称。 CONTAM 中的气流计算基于 AIRNET 中开发的算法[
<a href="../IDH_References.htm#REF_Walton_1989a">
沃尔顿 1989a
</a> and <a href="../IDH_References.htm#REF_Walton_1989b">
1989b
</a>]. </p>
