        <h3>
源/汇元件
</h3>
        <p>
CONTAM 使用称为
 <span style="font-style: italic;">
源/汇元件
</span> 
或在执行污染物模拟时实现源和汇的模型。 CONTAM 可以实现多个源/汇模型，以在房间内生成污染物或从房间中去除污染物。根据源/汇模型，它可用于模拟源、接收器或两者。这些源/宿元件类型中的每一个都在源/宿元件类型部分中详细描述。每个源/汇必须引用一个
 <span style="font-style: italic;">
源/汇元件
</span>
;然而，多个源/汇可以引用相同的
 <span style="font-style: italic;">
源/汇元件
</span>. </p>
        <p><span style="font-style: italic;">
源/汇元件
</span> 
也可以存储在 CONTAM 库文件中并在不同的 CONTAM 项目文件之间共享（请参阅
 <a href="../Library/IDH_UsingLibs_Working_with_Data_and_Libraries.htm">
使用数据和库
</a>).</p>
        <p>&#160;</p>
