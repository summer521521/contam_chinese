        <h5>
源/汇元件：突发源模型
</h5>
        <p>
爆发模型模拟污染物质量瞬间添加到某个房间。
</p>
        <p><span style="font-weight: bold;">
姓名：
</span> 
输入要用于标识源/汇元素的唯一名称。该元素将保存在当前项目中，并且可以与多个源/汇关联。

        </p>
        <p><span style="font-weight: bold;">
添加到房间的质量：
</span> 
输入释放到房间的瞬时质量值。质量的添加由时间表控制；当计划从零变为非零值时，质量会在一个模拟时间步长内添加到该区域。添加的质量量等于添加到房间值的质量乘以计划值。一个时间表可以在不同时间启动多个事件。

        </p>
        <p><span style="font-weight: bold;">
品种：
</span> 
从下拉框中选择先前定义的物种。

        </p>
        <p><span style="font-weight: bold;">
说明：
</span> 
用于输入特定接收器/源元件的更详细描述的字段。

        </p>
        <p><span style="font-weight: bold;">
注意：</span> 
您必须为此类源关联一个计划。
</p>
        <p>&#160;</p>
