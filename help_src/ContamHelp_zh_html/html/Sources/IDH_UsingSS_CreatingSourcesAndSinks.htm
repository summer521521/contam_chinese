        <h3>
创建源和汇
</h3>
        <p>
您可以通过在 SketchPad 上放置源/汇图标来创建源/汇（请参阅
 <a href="../SketchPad/IDH_UsingSketchPad_DrawingBuildingComponents.htm">
绘制建筑组件图标
</a>
）。在 ContamW 允许您在 SketchPad 上放置源/汇图标之前，您必须首先定义至少一个物种。每个源/汇必须放置在建筑房间内。您不能将它们放置在环境房间中。使用污染物的初始浓度属性（对于稳态模拟）或天气文件中包含的浓度（对于瞬态模拟）来处理环境源。如果弹出菜单的位置 ContamW 不允许放置图标，则“源/汇”菜单选项将被禁用（变灰）。
</p>
