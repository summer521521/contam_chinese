        <h5>
超级源/汇元件
</h5>
        <p>
将多个子元素组合成一个元素，该元素可以由 SketchPad 上的单个图标表示。

        </p>
        <p><span style="font-weight: bold;">
姓名：
 </span>
输入要用于标识源/汇元素的唯一名称。该元素将保存在当前项目中，并且可以与多个源/汇关联。

        </p>
        <p><span style="font-weight: bold;">
说明：
 </span>
用于输入特定接收器/源元件的更详细描述的字段。
        </p>
        <p><span style="font-weight: bold;">
可用元素：
 </span>
这是基本源/汇元素的列表，您可以从中构建超元件。此列表下方的项目提供有关当前突出显示的元素的信息。使用“编辑”和“新建”按钮可以修改或创建可用元素列表的基本类型的源/汇元素。
        </p>
        <p><span style="font-weight: bold;">
子元素：
 </span>
使用“添加”和“删除”按钮修改构成超元件的子元素列表。

        </p>
        <p>&#160;</p>
