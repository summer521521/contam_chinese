        <h3>
管道流元件
</h3>
        <p>
每个管道段必须引用一个
 <span style="font-style: italic;">
管道流元件
</span>. <span style="font-style: italic;">
管道流动元件
</span> 
描述沿管道的流量和压降、流阻或强制流动特性、横截面几何形状以及管道单位长度的可选泄漏之间的数学关系。 ContamW 为您提供了几种不同的数学模型或元素类型可供选择。这些管道流元件类型中的每一种都在
 <a href="IDH_UsingDucts_Duct_Segment_Properties.htm">
风管段属性
</a> 
部分。虽然每个管道段必须引用一个
 <span style="font-style: italic;">
管道流元件
</span>
，多个管道段可以引用相同的
 <span style="font-style: italic;">
管道流元件
</span>. <span style="font-style: italic;">
管道流动元件
</span> 
也可以存储在 CONTAM 库文件中并在不同的 CONTAM 项目文件之间共享。
 </p>
