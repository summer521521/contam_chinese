        <h4><a name="kanchor76"></a>
风管段 - 过滤器属性
</h4>
        <p><span style="font-weight: bold;">
过滤器：
</span> 
您可以从关联名称列表中包含的过滤器中选择先前定义的过滤器。单击“新建过滤器”按钮定义新过滤器。单击“编辑过滤器”按钮可以查看或修改现有的过滤器数据。将此字段设置为 &lt;
无
&gt; 
表示该气流路径没有过滤器。 （参见
 <a href="../Contaminants/IDH_UsingContaminants_Contaminant_Filters.htm">污染物过滤器
</a> 
下
 <a href="../Contaminants/IDH_UsingContams_WorkingWithContaminants.htm">
处理污染物
</a>)</p>
