        <h3><a name="kanchor73"></a>
修改管道
</h3>
        <p>
为了修改风管系统的布局，您必须取消定义要连接新风管的任何部分（即形成连接点）。要修改风管段、连接点或终端的参数，您可以使用图标定义方法来显示其属性并进行所需的更改。您不必取消定义项目来更改其属性，只需更改物理布局即可。
 </p>
        <p>
要删除两个线段之间的交汇处，应首先取消定义两个风管段，删除交汇处，然后重新定义新形成的较长线段。要将一个段拆分为两个段，请双击
 <span style="font-weight: bold;">LMB</span> 
使用风管绘图工具在要放置连接处的未定义段上。
 </p>
