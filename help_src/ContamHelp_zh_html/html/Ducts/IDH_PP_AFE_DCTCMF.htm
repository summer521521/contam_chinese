        <h5><a name="kanchor84"></a>
风扇型号：恒定质量流量
</h5>
        <p>
该气流元件允许您将通过管道的气流描述为恒定的质量气流速率。</p>
        <p><span style="font-weight: bold;">
姓名：
</span> 
输入要用于标识风管流元素的唯一名称。该元素将保存在当前项目中，并且可以与多个风管段关联。
</p>
        <p><span style="font-weight: bold;">
说明：
</span> 
用于输入特定管道流元素的更详细描述的字段。
</p>
        <p><span style="font-weight: bold;">
设计（最大）流量：
</span> 
输入最大质量流量。您可以使用风管段明细表来修改该值。
</p>
        <p><span style="font-weight: bold;">
形状尺寸和泄漏：
</span> 
您必须输入数据来物理描述每个管道气流元件。您在
 <a href="IDH_PP_AFE_DCTSHAPE.htm">
形状尺寸和泄漏量
</a> 
与每个管道气流元件关联的属性页。
</p>
