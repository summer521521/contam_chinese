        <h2><a name="_Toc143425670"></a><a name="_Toc143425454"></a><a name="_Toc114381075"></a>
烟雾控制系统
</h2>
        <p>
对于楼梯间增压系统，您可能需要通过创建一个简单的 AHS 模型（在竖井中具有供应点）来记录增压流量。将这些补给点设为次要路径。您可以使用在每个级别上对齐的供应点图标，并将部分或大部分流量设置为零，或者您可以仅在具有加压流量的那些级别上使用图标。或者，对于建筑物外墙上的竖井，您可能希望使用穿过外墙的恒定流速路径元件来提供加压空气。这种类型的流路还将报告轴与环境之间的压力差。您可能希望将这些恒定流动路径对齐在第一层敞开的门口上方。有关查看轴报告的详细信息，请参阅手册的使用 ContamW 部分中的处理结果。

        </p>
