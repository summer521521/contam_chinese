        <h3><a name="kanchor122"></a>
创建库
</h3>
        <p>
使用 CONTAMW 库管理器，您可以通过以下两种方式之一创建新库。您可以使用“另存为...”按钮以新名称保存现有库，或使用 CONTAMW 库管理器对话框的库文件部分的“新建”按钮。 “另存为...”方法以新名称复制当前显示的库文件，但保留原始文件。 “新建”方法会清除当前显示的数据，并允许您从空库文件开始。
</p>
