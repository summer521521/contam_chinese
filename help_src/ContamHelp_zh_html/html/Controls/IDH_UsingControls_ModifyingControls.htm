        <h3>
修改控件
</h3>
        <p>
要修改已定义控制节点的参数，请使用图标定义过程（请参见
 <a href="../SketchPad/IDH_UsingSketchPad_DefiningBuildingComponentIcons.htm">
定义建筑组件图标
</a>
) 显示其属性并进行所需的更改。您无法移动和复制控件。为此，您必须删除并重新绘制控制网络，因此建议在布局控制网络时仔细规划。
</p>
        <p>&#160;</p>
