        <h3><a name="kanchor137"></a>
删除日程
</h3>
        <p>您只能通过删除关联的占用者暴露图标来删除占用周计划。删除所有其他计划只能使用 CONTAMW 库管理器来完成（请参阅
 <a href="../Library/IDH_UsingLibs_Working_with_Data_and_Libraries.htm">
使用数据和库
</a>
），这仅允许您删除那些不再与任何占用者、房间或其他建筑组件关联的明细表。
</p>
