        <h3><a name="kanchor18"></a>
修改级别
</h3>
        <p>
要修改级别数据，您可以使用以下命令访问“级别数据”对话框
 <span style="font-weight: bold;text-decoration: underline;">E</span><span style="font-weight: bold;">
编辑级别数据...
</span> 
的命令 <span style="font-weight: bold;text-decoration: underline;">L</span><span style="font-weight: bold;">
埃维尔
</span> 
菜单。您还可以使用键盘快捷键
 <span style="font-weight: bold;">F8</span> 
显示对话框。以下部分显示“级别数据”对话框中包含的信息。
</p>
