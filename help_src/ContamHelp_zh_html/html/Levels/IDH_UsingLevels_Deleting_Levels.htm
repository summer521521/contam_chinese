        <h3><a name="kanchor17"></a>
删除关卡
</h3>
        <p>
菜单命令：
&#160;<span style="font-weight: bold;text-decoration: underline;">L</span><span style="font-weight: bold;">
埃维尔
 </span>&#8594;<span style="font-weight: bold;"> <![CDATA[ ]></span><span style="font-weight: bold;text-decoration: underline;">D</span><span style="font-weight: bold;">
精英等级
</span><br />
键盘快捷键：
 &#160;
无
<br />
工具栏按钮：
 &#160;&#160;
无
 </p>
        <p>
使用此命令可以删除整个级别。一旦删除关卡，就无法撤消删除操作。您可能希望在删除关卡之前保存文件的副本；这是防止丢失工作的唯一方法。
</p>
