        <h5>
供应和退货点 - CFD 属性
</h5>
        <p class="NormalCW2">
简单的 AHS 供应点和返回点可以放置在 CFD 房间内。
</p>
        <p class="NormalCW2"><b>
CFD 路径 ID：
</b> 
每个供应/退货都必须有一个唯一的标识符。该标识符将用于识别 CFD0 编辑器程序中的供应/返回，该程序用于定义相对于 CFD 房间的接口路径的位置。
</p>
