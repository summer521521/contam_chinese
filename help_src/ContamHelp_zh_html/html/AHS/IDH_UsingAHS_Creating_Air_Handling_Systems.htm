        <h3>
创建简单的空气处理系统
</h3>
        <p>
你创造
 <span style="font-style: italic;">
简单的空气处理系统
</span> 
通过放置一个
 <span style="font-style: italic;">
空气处理系统 (AHS) 图标
</span> 
在 SketchPad 上以及一些组合
 <span style="font-style: italic;">
供应
</span> 
和/或
 <span style="font-style: italic;">
返回图标
 </span>
（参见
 <a href="../SketchPad/IDH_UsingSketchPad_DrawingBuildingComponents.htm">
绘制建筑组件图标
</a>
）。您可以放置一个
 <span style="font-style: italic;">
AHS 图标
</span> 
在任何级别的 SketchPad 的任何空白单元格上。您不必将其放置在房间内。但是，您必须放置
 <span style="font-style: italic;">
供应图标
</span> and <span style="font-style: italic;">
返回图标
</span> 
在一个房间内。如果您在 ContamW 不允许放置这些图标的位置弹出菜单，则弹出菜单选项将被禁用（变灰）。
</p>
