        <h5>
空气处理系统 - 过滤器属性
</h5>
        <p>
正如名字所暗示的那样， <i>
室外空气过滤器
</i> 
影响简单空气处理系统从建筑物外部引入的空气，同时
 <i>
再循环空气过滤器
</i> 
影响通过空气处理器循环回的回风。您可以创建、编辑或删除与简单空气处理器的隐式室外空气和再循环流路关联的过滤器。创建新过滤器或修改现有过滤器将显示“过滤器”对话框。  有关污染物过滤器的说明，请参见
 <a href="../Contaminants/IDH_UsingContaminants_Contaminant_Filters.htm">
使用过滤器
</a> 
在
 <a href="../IDH_Using_Overview.htm">
使用 CONTAM
</a> 
手册的部分。

        </p>
