        <h3>
结果显示
</h3>
        <p class="Normal"><span style="font-weight: bold;">
结果线
</span><span style="font-weight: bold;"><span style="font-weight: bold;">:</span> <![CDATA[ ]></span>
您可以选择是否显示气流路径上的气流速率和压力差。
</p>
        <p class="NormalIndent"><b>
压力和流量</b>
：在结果显示模式下，在 SketchPad 上显示气流速率（绿线）和压差（红线）。
</p>
        <p class="NormalIndent"><b>
仅压力
</b>
：仅显示压差线。
</p>
        <p class="NormalIndent"><b>
仅流量
</b>
：仅显示气流线。
</p>
        <p><span style="font-weight: bold;">
时间步导航
</span><span style="font-weight: bold;"><span style="font-weight: bold;">:</span> <![CDATA[ ]></span>
设置使用“结果导航”跳转命令时要跳过的模拟时间步数。
 </p>
        <p>See <a href="../Results/IDH_UsingResults_Viewing.htm">
查看结果
</a> 
在
 <a href="../Results/IDH_UsingResults_Working_with_Results.htm">
处理结果
</a> 
部分。
</p>
