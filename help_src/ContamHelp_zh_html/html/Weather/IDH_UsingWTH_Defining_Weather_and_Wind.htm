        <h3>
定义天气和风
</h3>
        <p>
您可以根据要执行的模拟类型定义希望 CONTAM 使用的天气。您将定义稳态天气或瞬态天气。最好在执行瞬态仿真之前执行一组稳态仿真。这可以让您更好地识别因处理瞬态天气而可能出现的任何问题。 ContamW 还提供了一种方法来验证您是否正确输入了与风有关的数据（请参阅
 <a href="IDH_UsingWTH_Defining_Steady_State_Weather_and_Wind.htm#IDM_CheckingWind">
检查风压数据
</a>).</p>
