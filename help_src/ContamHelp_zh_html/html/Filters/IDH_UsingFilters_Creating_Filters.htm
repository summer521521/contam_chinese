        <h3><a name="kanchor101"></a>
创建过滤器
</h3>
        <p>
您可以为需要过滤器的每个建筑组件创建过滤器。当您定义其中之一时
 <span style="font-style: italic;">
过滤就绪
</span> 
构建上面介绍的组件时，将提供一个过滤器属性页，使您能够确定是否关联过滤器，或者修改或删除先前为该组件定义的过滤器。
</p>
