        <h3><a name="kanchor105"></a>
过滤元件类型
</h3>
        <p>
这些是您可以使用 CONTAM 实现的过滤器元件类型或模型。详细说明请参阅各具体型号的相关资料。
</p>
        <p class="NormalIndent"><a href="IDH_FLTE_CEF.htm">
恒效过滤器
</a>
：为每个用户选择的物种定义恒定效率。
</p>
        <p class="NormalIndent"><a href="IDH_FLTE_PF0.htm">
简单的粒子过滤器
</a>
：将过滤器效率定义为颗粒尺寸的函数，例如 MERV 曲线。
</p>
        <p class="NormalIndent"><a href="IDH_FLTE_GF0.htm">
简单的气体过滤器
</a>
：将过滤器效率定义为用户可选择的一组物种的过滤器负载的函数。
</p>
        <p class="NormalIndent"><a href="IDH_FLTE_UV1.htm">
宾夕法尼亚州立大学 UVGI 过滤器
</a>
：定义紫外线杀菌照射滤光片。
</p>
        <p class="NormalIndent"><a href="IDH_FLTE_SUPER.htm">
超级过滤器
</a>：这使得可以将多个过滤元件组合成单个过滤器，例如，包括气体过滤器和过滤颗粒的预过滤器的封装过滤器。
</p>
