        <h3><a name="kanchor100"></a>
过滤元件
</h3>
        <p>
CONTAM 使用称为
 <span style="font-style: italic;">
过滤元件
</span> 
或在执行污染物模拟时实施过滤器的模型。 CONTAM 可以实现多种不同的过滤器模型，以去除污染物通过具有过滤功能的建筑组件。这些元素类型在
 <a href="IDH_FLTE_MODELS.htm">
过滤元件类型
</a> 
部分。每个 <span style="font-style: italic;">
过滤器
</span> 
必须引用单个
 <span style="font-style: italic;">
滤芯
</span>
;然而，多个
 <span style="font-style: italic;">
过滤器
</span> 
可以参考同一个
 <span style="font-style: italic;">
滤芯
</span>. </p>
        <p><span style="font-style: italic;">
滤芯
</span> 
也可以存储在 CONTAM 库文件中并在不同的 CONTAM 项目文件之间共享（请参阅
 <a href="../Library/IDH_UsingLibs_Working_with_Data_and_Libraries.htm">
使用数据和库
</a>).</p>
        <p>&#160;</p>
