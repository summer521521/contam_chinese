        <h4>
超级过滤器
</h4>
        <p>
使用此元件将多个过滤器元件串联组合成一个过滤器。
 </p>
        <p><span style="font-weight: bold;">
姓名：
</span> 
您想要用来识别超级过滤器滤芯的唯一名称。
</p>
        <p><span style="font-weight: bold;">
说明：
</span> 
使用此字段提供过滤器元素的更详细描述。
</p>
        <p><span style="font-weight: bold;">
子元素：
</span> 
您可以从以下列表中构建此子元素列表
 <span style="font-style: italic;">
可用元素
</span> 
这些元素在列表中出现的顺序很重要。它们应按照空气在列表中从上到下流经过滤器的顺序放置。使用“添加”、“删除”和“移动”按钮修改此列表。
</p>
        <p><span style="font-weight: bold;">
可用元素：
</span> 
这是基本过滤器元素的列表，例如，
 <span style="font-style: italic;">
恒定效率
</span>, <span style="font-style: italic;">
简单气态
</span>
, 和
 <span style="font-style: italic;">
简单粒子
</span>
，包含在当前项目文件中。使用
 <span style="font-style: italic;">
编辑元素
</span> and <span style="font-style: italic;">
新元素
</span> 
按钮来修改此列表。
</p>
        <p>&#160;</p>
