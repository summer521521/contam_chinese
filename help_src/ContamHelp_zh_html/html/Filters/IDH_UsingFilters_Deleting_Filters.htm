        <h3><a name="kanchor102"></a>
删除过滤器
</h3>
        <p>
您可以通过访问要删除其过滤器的单个组件的属性或删除建筑组件本身来删除过滤器。请注意，删除一个
 <span style="font-style: italic;">
过滤器
</span> 
不删除关联的
 <span style="font-style: italic;">
滤芯
</span> 
（您不能删除
 <span style="font-style: italic;">
滤芯
</span> 
当前与一个相关联
 <span style="font-style: italic;">
过滤器
</span>).</p>
        <p>&#160;</p>
