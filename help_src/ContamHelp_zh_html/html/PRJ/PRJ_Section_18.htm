        <h5>
第 18 节：初始结浓度
</h5>
        <p>初始结污染物质量分数由zone_read()函数读取并由zone_save()函数保存。质量分数存储在 contam.h 中为 ContamW 定义的 ZONE_DSC 结构中，并且它们存储在 ContamX 中的数组中。
</p>
        <p class="NormalItalic">
初始结污染物部分开始于：
 </p>
        <p class="code">
nn // 后面的质量分数数 (
<span style="color: red;">IX</span>)</p>
        <p class="NormalItalic">
nn 应等于 _njct * _nctm。接下来是 _njct 行，按从结点 1 到结点 _njct 的顺序排列。
</p>
        <p class="NormalItalic">
每个数据行包含按污染物顺序排列的 _nctm 质量分数 (R4)。
</p>
        <p class="NormalItalic">
初始连接浓度部分终止于：
</p>
        <p class="code">
-999 // 用于检查上述数据是否有读取错误
</p>
        <p class="code">&#160;</p>
        <p>&#160;</p>
