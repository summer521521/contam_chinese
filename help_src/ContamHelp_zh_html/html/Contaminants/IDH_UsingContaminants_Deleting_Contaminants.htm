        <h3><a name="kanchor93"></a>
删除物种和污染物
</h3>
        <p>
您可以使用删除按钮来删除物种
 <a href="IDH_UsingContaminants_ProjectSpecies.htm">
项目种类
</a> 
对话框或 CONTAMW 数据和库管理器：物种对话框。如果物种与源/汇、过滤或动力学反应相关，则无法删除它们。对于那些存在关联的物种，“删除”按钮将被停用。您还可以通过在模拟中取消选择给定物种的“在模拟中使用”框来禁用模拟中污染物的使用。
 <a href="IDH_UsingContaminants_SpeciesProperties.htm">
物种特性
</a> 
对话框。
 </p>
