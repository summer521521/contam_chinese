        <h3><a name="kanchor94"></a>
改变物种和污染物
</h3>
        <p>
为项目创建物种后，您可以修改任何相关参数。这是通过使用编辑按钮来完成的
 <a href="IDH_UsingContaminants_SpeciesProperties.htm">
物种特性
</a> 
通过以下方式访问的对话框
 <span style="font-weight: bold;text-decoration: underline;">D</span><span style="font-weight: bold;">ata</span> <![CDATA[ ]>&#8594;<span style="font-weight: bold;"> <![CDATA[ ]></span><span style="font-weight: bold;text-decoration: underline;">C</span><span style="font-weight: bold;">
污染物…
</span> 
菜单项。 ContamW 将允许您更改现有污染物的名称，而不影响任何当前关联的源、汇、过滤器或动力学反应，因为它们通过 ContamW 创建的内部索引引用污染物。
</p>
