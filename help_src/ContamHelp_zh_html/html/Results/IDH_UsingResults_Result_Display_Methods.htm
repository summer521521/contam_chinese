        <h3>
结果显示方法
</h3>
        <p>
本节介绍 ContamW 用于呈现模拟结果的各种方法。这些方法包括用于气流路径的 SketchPad、用于显示当前在 SketchPad 上突出显示的图标的更多详细信息的结果显示窗口、在图表、轴报告上绘制瞬态结果以及将结果导出到各种类型的外部文件。您还可以打印使用 ContamW 查看的图表副本，或将其复制到 Windows 剪贴板以粘贴到其他应用程序（例如用于书面报告的文字处理应用程序）。
</p>
