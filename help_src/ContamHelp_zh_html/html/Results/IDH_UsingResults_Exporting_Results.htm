        <h3><a name="kanchor150"></a>
导出结果
</h3>
        <p>
ContamW 使您能够将结果导出到外部文件。您可以生成
 <span style="font-style: italic;">
报告文件</span> or <span style="font-style: italic;">
导出文件
</span>. <span style="font-style: italic;">
报告文件
</span> 
是为了便于阅读而格式化的文本文件。 <span style="font-style: italic;">
导出文件
</span> are <span style="font-style: italic;">
制表符分隔
</span>
，这样您就可以轻松地将它们导入到电子表格中。此功能为您提供了更大的图表灵活性以及对模拟结果执行更复杂的数据分析的能力。您可以通过选择来访问 ContamW 的此功能
 <span style="font-weight: bold;">E</span><span style="font-weight: bold;text-decoration: underline;">x</span><span style="font-weight: bold;">
端口结果...</span>  
从
 <span style="font-weight: bold;text-decoration: underline;">S</span><span style="font-weight: bold;">
模拟
</span> 
菜单或使用
 <span style="font-weight: bold;">F5</span> 
结果显示模式激活时的快捷键。这将显示“导出数据”对话框，如下节所述。
</p>
