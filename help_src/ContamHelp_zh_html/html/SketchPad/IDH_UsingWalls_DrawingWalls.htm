        <h3><a name="kanchor11"></a>
绘制墙壁
</h3>
        <p>
您可以使用前面在“中”中描述的两个墙壁绘制工具之一来绘制墙壁
<a href="IDH_UsingSketchPad_DrawingWallsandDucts.htm">
使用 SketchPad
</a>
”部分。使用
 <span style="font-style: italic;">
盒子绘图工具
</span> 
快速绘制一个矩形区域
 <span style="font-style: italic;">
墙壁绘图工具
</span> 
绘制自由形状的墙。使用墙壁绘图工具可以绘制几乎任何形状的墙壁。墙壁必须始终形成完整的围护结构。因此，墙不能有开放或悬空的端部。它也可能不会跨建筑组件图标绘制。如果您尝试绘制无效的墙，您将收到一条警告消息。
</p>
