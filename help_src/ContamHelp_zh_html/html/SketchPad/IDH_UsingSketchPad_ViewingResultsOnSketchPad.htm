        <h3><a name="kanchor6"></a>
在 SketchPad 上查看结果
</h3>
        <p>
ContamW 在 SketchPad 上提供一些模拟结果的图形显示。如果已执行模拟并且模拟结果可用，您可以在 SketchPad 上显示气流路径上的气流速率和压力差（请参阅
 <a href="../Results/IDH_UsingResults_Viewing.htm">
查看结果
</a> 
在
 <a href="../Results/IDH_UsingResults_Working_with_Results.htm">
处理结果
</a> 
手册部分）。
 </p>
