        <h3><a name="kanchor4"></a>
定义建筑组件图标
</h3>
        <p>
当在 SketchPad 上绘制新的建筑组件图标时，它会显示为红色图标。红色表示组件的参数仍必须定义。要定义建筑组件，请双击 (
<span style="font-weight: bold;">LMB</span>
) 上的图标或将插入符号移至该图标并按
 <span style="font-weight: bold;">
输入
</span> 
关键。这将激活所选组件的关联对话框或属性表，您可以在其中输入定义组件的参数。输入组件参数后，单击
 <span style="font-weight: bold;">OK </span>
按钮接受参数或
 <span style="font-weight: bold;">
取消
 </span>
按钮不接受参数。每个组件图标的详细属性将在本手册的“使用ContamW”部分中介绍。
 </p>
        <p><b>NOTE</b> 
- 按
 <b>
F1 帮助
</b> 
键来激活
 <i>
上下文相关帮助系统
</i> 
这解释了每个建筑构件的属性。
</p>
