        <h3><a name="kanchor7"></a>
查看包络线风压差
</h3>
        <p>
ContamW 提供了一项功能，可让您可视化风对建筑围护结构的影响。可以在 SketchPad 上查看与环境房间相邻的每个流路处的风压图形显示（请参阅
 <a href="../Weather/IDH_UsingWTH_Defining_Steady_State_Weather_and_Wind.htm#IDM_CheckingWind">
检查风压数据
</a> 
在
 <a href="../Weather/IDH_UsingWTH_Defining_Steady_State_Weather_and_Wind.htm">
定义稳态天气和风
</a> 
部分）。此功能使您能够根据建筑围护结构相对于风的方向来验证风速和风向数据的输入。
</p>
