        <h3><a name="kanchor12"></a>
删除墙壁
</h3>
        <p>
您可以通过将插入符号移动到墙的任何部分并选择来删除墙
 <span style="font-weight: bold;">
删除
</span> 
从
 <span style="font-weight: bold;">
编辑
</span> 
菜单或使用键盘快捷键
 <span style="font-weight: bold;">Del</span> 
关键。 ContamW 将突出显示要删除的墙部分，并请求确认删除指定部分。如果插入符号位于三个或更多墙的交叉点上，您将获得多个要删除的墙段选项。如果您在要求确认删除时选择“否”，则下一个删除选项将突出显示，直到您删除一个部分或用尽所有选项。
</p>
