        <h3>
修改房间
</h3>
        <p>
您可以通过添加和删除墙壁来修改房间的 SketchPad 表示。该过程在
 <a href="../SketchPad/IDH_UsingWalls_Modifying_Walls.htm">
改造墙壁
</a> 
本手册的部分。要修改房间的参数，可以使用图标定义过程（请参见
 <a href="../SketchPad/IDH_UsingSketchPad_DefiningBuildingComponentIcons.htm">
定义建筑组件图标
</a>
) 显示其属性并进行所需的更改。
</p>
        <p>
定义房间后，您可以使用 <span style="font-weight: bold;">Cu</span><span style="font-weight: bold;text-decoration: underline;">t</span> and <span style="font-weight: bold;text-decoration: underline;">P</span><span style="font-weight: bold;">
阿斯特
</span> 
的职能
 <span style="font-weight: bold;text-decoration: underline;">E</span><span style="font-weight: bold;">dit</span> 
菜单。这些命令仅允许您将图标粘贴到其当前所在的房间中。
</p>
        <p>&#160;</p>
