        <h3>
删除房间
</h3>
        <p>
您可以通过首先删除房间图标来删除房间。删除房间图标后，删除消除留下的封闭房间所需的一堵或多堵墙。您必须避免存在没有房间图标的封闭房间； CONTAM 不会在项目中使用未定义的房间图标执行模拟。
</p>
