        <h3><a name="kanchor36"></a>
气流元件
</h3>
        <p>
每个气流路径必须引用一个气流元件。
 <span style="font-style: italic;">
气流元件
</span> 
描述通过气流路径的流量与路径上的压降之间的数学关系。 ContamW 为您提供了多种数学模型或类型供您选择。这些气流元件类型中的每一种都在
 <a href="IDH_UsingPaths_Airflow_Path_Properties.htm">
气流路径属性
</a> 
部分。虽然每个气流路径都必须引用一个
 <span style="font-style: italic;">
气流元件
</span>
，多个路径可以引用同一个
 <span style="font-style: italic;">
气流元件
</span>. <span style="font-style: italic;">
气流元件
</span> 
也可以存储在 CONTAM 库文件中并在不同的 CONTAM 项目文件之间共享（请参阅
 <a href="../Library/IDH_UsingLibs_Working_with_Data_and_Libraries.htm">
使用数据和库
</a>).</p>
