        <h6>
二次模型：裂纹描述
</h6>
        <p>
该模型采用以下形式的二次关系
 <span style="font-family: &#x27;Symbol&#x27;;">D</span>
P = aQ + bQ² 其中 Q 是体积流量 [
<a href="../IDH_References.htm#REF_Baker_1987">
贝克、沙普尔斯和沃德 1987
</a>
]。 CONTAM 使用该公式的质量流量版本：
 <span style="font-family: &#x27;Symbol&#x27;;">D</span>
P = aF + bF² 其中
 <span style="font-family: &#x27;Symbol&#x27;;">D</span>
P 是压降，F 是质量流量。
</p>
        <p><span style="font-weight: bold;">
姓名：
</span> 
输入要用于识别气流元件的名称。气流元件将保存在当前项目中，并且可以与多个气流路径关联。
</p>
        <p><span style="font-weight: bold;">
裂纹尺寸：
</span>
        </p>
        <p class="NormalIndent"><span style="text-decoration: underline;">
长度
</span>
：裂缝的总长度
</p>
        <p class="NormalIndent"><span style="text-decoration: underline;">
宽度
</span>
: 裂缝宽度
</p>
        <p class="NormalIndent"><span style="text-decoration: underline;">
深度
</span>
：沿气流方向的距离
</p>
        <p><span style="font-weight: bold;">
弯曲次数
</span>
：流路中的弯曲数量。
 </p>
        <p><span style="font-weight: bold;">
说明：
</span> 
用于输入特定气流元件的更详细描述的字段。
</p>
        <p>&#160;</p>
