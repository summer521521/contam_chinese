        <h5><a name="kanchor61"></a>
风扇和强制流动模型
</h5>
        <p>
这些气流元件模型使您能够轻松创建强制气流元件作为两个房间之间的气流路径，而不是实施管道模型或简单的空气处理系统。风机型号有恒定质量流量、恒定体积流量和风机性能曲线三种类型可供选择。
 </p>
