        <h5><a name="kanchor49"></a>
使用幂律模型的单向流
</h5>
        <p>
CONTAM 使用质量流量幂律公式 F = C(
<span style="font-family: &#x27;Symbol&#x27;;">D</span>
P)^n，适用于以下类型的气流元件。其中 F 是质量流量，
 <span style="font-family: &#x27;Symbol&#x27;;">D</span>
P 是流道上的压差，C 是流量系数，n 是流量指数。但是，对于某些幂律模型，ContamW 使您能够输入用系数 C 和指数 n 以外的术语描述开口的参数。然后，这些参数通过 ContamW 进行内部转换，以确定幂律模型质量流量版本的 C 和 n。
</p>
