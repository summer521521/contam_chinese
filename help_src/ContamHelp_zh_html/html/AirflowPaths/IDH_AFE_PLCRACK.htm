        <h6><a name="kanchor53"></a>
幂律模型：裂纹描述
</h6>
        <p>
该气流元件允许您输入裂缝的描述，并且基于裂缝流动和幂律模型之间建立的关系[
<a href="../IDH_References.htm#REF_Clarke_1985">
克拉克 1985
</a>].</p>
        <p><span style="font-weight: bold;">
姓名：
</span> 
输入要用于识别气流元件的名称。气流元件将保存在当前项目中，并且可以与多个气流路径关联。
</p>
        <p><span style="font-weight: bold;">
裂缝长度/宽度：
</span> 
输入裂缝的长度和宽度。
</p>
        <p><span style="font-weight: bold;">
说明：
</span> 
用于输入特定气流元件的更详细描述的字段。
</p>
        <p><span style="font-style: italic;">
注意：
 </span><span style="font-style: italic;">
ContamW 自动使用小开口图标来描述幂律模型裂纹。
</span>
        </p>
        <p>&#160;</p>
