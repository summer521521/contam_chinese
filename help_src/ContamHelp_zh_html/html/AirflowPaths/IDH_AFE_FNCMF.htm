        <h6>
风机型号：恒质量流量风机
</h6>
        <p>该模型描述了具有恒定质量流量的气流元件。无论风扇输送的空气密度如何，该气流元件都将提供指定的恒定质量流量。
</p>
        <p><span style="font-weight: bold;">
姓名：
</span> 
输入要用于识别气流元件的名称。气流元件将保存在当前项目中，并且可以与多个气流路径关联。
</p>
        <p><span style="font-weight: bold;">
设计（最大）流量：
</span> 
输入最大质量流量。该值可以通过路径调度来修改。
</p>
        <p><span style="font-weight: bold;">
说明：
</span> 
用于输入特定气流元件的更详细描述的字段。
</p>
