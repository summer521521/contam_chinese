        <h6><a name="kanchor57"></a>
双向流模型：二开
</h6>
        <p>
该模型考虑了由于烟囱效应作用于高开口高度而产生的双向流动。它使用不同高度的两个幂律流动模型来近似单个高开口。
</p>
        <p><span style="font-weight: bold;">
姓名：
</span> 
输入要用于识别气流元件的名称。气流元件将保存在当前项目中，并且可以与多个气流路径关联。
</p>
        <p><span style="font-weight: bold;">
身高：
</span> 
开口的总高度，不要与开口的总高度混淆
 <span style="font-style: italic;">
相对海拔</span> 
与元素相关联的流路的数量。
</p>
        <p><span style="font-weight: bold;">
宽度：
</span> 
开口的宽度。
</p>
        <p><span style="font-weight: bold;">
流量系数：
</span>  
这是通过实验确定的值。 Weber 和 Kearney 的实验表明，默认值 0.78 适合大多数应用程序。
</p>
        <p><span style="font-weight: bold;">
说明：
</span> 
用于输入特定气流元件的更详细描述的字段。
</p>
        <p><span style="font-weight: bold;">
图标：
</span> 根据特定气流元件选择小或大开口图标。该图标对模拟没有影响。
</p>
