        <h6>
二次模型：
 <span style="font-family: &#x27;Symbol&#x27;;">D</span>
P = aF + bF²
</h6>
        <p>
该模型允许您直接将系数 a 和 b 输入到二次流模型的质量流量版本中。哪里
 <span style="font-family: &#x27;Symbol&#x27;;color: black;">D</span>
P 是压降，F 是质量流量。
 </p>
        <p><span style="font-weight: bold;">
姓名：
</span> 
输入要用于识别气流元件的名称。气流元件将保存在当前项目中，并且可以与多个气流路径关联。
</p>
        <p><span style="font-weight: bold;">
系数：
</span> 
由于 ContamW 处理单位转换的方式，系数必须以 SI 单位表示。系数的单位如下：
</p>
        <p>
            <img src="../../image/ebx_-1173484239_104x48.gif" border="0" alt="
图片\ebx_-1173484239.gif
" style="width: 104; height: 48;" />
        </p>
        <p><span style="font-weight: bold;">
说明：
</span> 
用于输入特定气流元件的更详细描述的字段。
</p>
        <p><span style="font-weight: bold;">
图标：
</span> 根据特定气流元件选择小或大开口图标。该图标对模拟没有影响。
</p>
