        <h5><a name="kanchor45"></a>
气流路径 – 过滤器属性
</h5>
        <p><span style="font-weight: bold;">
过滤器：
</span> 
您可以创建、编辑或删除与此流路径关联的过滤器。创建新过滤器或修改现有过滤器将显示
 <a href="../Filters/IDH_FILTER_DEF.htm">
过滤器属性
</a> 
对话框。使用此对话框可以根据需要创建和编辑过滤器元素。有关污染物过滤器的说明，请参见
 <a href="../Contaminants/IDH_UsingContaminants_Contaminant_Filters.htm">污染物过滤器
</a> 
在
 <a href="../IDH_Using_Overview.htm">
使用 CONTAMW
</a> 
手册的部分。
</p>
