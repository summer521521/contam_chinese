        <h6>
幂律模型：测试数据（2 分）
</h6>
        <p>
该气流元件允许您提供两个测试数据点，ContamW 通过根据输入值计算流量系数将其简化为幂律模型（请参阅拟合幂律系数）
 <a href="../Theory/IDH_Theory_Background.htm">
理论背景
</a> 
部分）。
</p>
        <p><span style="font-weight: bold;">
姓名：
</span> 
输入要用于识别气流元件的名称。气流元件将保存在当前项目中，并且可以与多个气流路径关联。
</p>
        <p><span style="font-weight: bold;">
压力D
</span><span style="font-weight: bold;">
差异
</span><span style="font-weight: bold;"> (</span><span style="font-family: &#x27;Symbol&#x27;;font-weight: bold;">D</span><span style="font-weight: bold;font-style: italic;">P</span><span style="font-weight: bold;">)</span><span style="font-weight: bold;">:</span> 
输入两个数据点中每一个的压力差。
 </p>
        <p><span style="font-weight: bold;">
流量
</span><span style="font-weight: bold;"> (</span><span style="font-weight: bold;font-style: italic;">F</span><span style="font-weight: bold;">)</span><span style="font-weight: bold;">:</span> 
输入每个数据点的流速。 </p>
        <p><span style="font-weight: bold;">
说明：
</span> 
用于输入特定气流元件的更详细描述的字段。
</p>
        <p><span style="font-weight: bold;">
图标：
</span> 根据特定气流元件选择小或大开口图标。该图标对模拟没有影响。
</p>
