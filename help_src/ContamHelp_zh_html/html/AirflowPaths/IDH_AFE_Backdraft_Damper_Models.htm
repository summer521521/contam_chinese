        <h5><a name="kanchor58"></a>
逆止阻尼器模型
</h5>
        <p>
逆流阻尼器模型可以对根据压降方向具有不同流阻的特征进行建模，其中一个方向上的流量大大减少（或为零）。请注意，管道流元件也有类似的模型。
</p>
