        <h5><a name="kanchor55"></a>
双向流模型
</h5>
        <p>
这些模型使您能够模拟可能出现双向气流的开口（例如门口和打开的窗户）。查看这些模型的结果时，如果发生双向流，将在 SketchPad 上指示。您还可以使用 ContamW 的气流绘图功能来绘制两个气流或简单地绘制净气流。相关气流路径上必须存在密度差，以便在这些类型的气流元件上发生双向流动。有关更详细的解释，请参阅理论部分中的门道（大开口）。
</p>
        <p>The <span style="font-style: italic;">
相对海拔</span> 
实现这些模型的流路的数量应设置为流路的底部，而不是用于其他元素类型的中间高度。
</p>
