        <h3><a name="kanchor39"></a>
删除气流路径
</h3>
        <p>
您可以使用图标删除程序删除气流路径图标（请参阅
 <a href="../SketchPad/IDH_UsingSketchPad_Deleting_Building_Component_Icons.htm">删除建筑组件图标
</a>
）。从 SketchPad 删除气流路径图标不会删除您可能已定义的任何气流元件。这些流程元素只能使用 CONTAM 库管理器删除，可通过
 <span style="font-weight: bold;text-decoration: underline;">D</span><span style="font-weight: bold;">ata</span> 
每种类型的数据元素的菜单。
</p>
