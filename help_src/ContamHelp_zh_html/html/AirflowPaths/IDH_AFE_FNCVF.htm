        <h6>
风机型号：定风量风机
 </h6>
        <p>
该模型描述了具有恒定体积流量的气流元件。您指定的设计流量是按标准空气计算的。 CONTAM 使用密度 1.204 kg/m3
<span style="vertical-align: super;font-size: 10pt;">3</span> 
基于 ASHRAE 指定的干燥空气条件：101.325 kPa 和 20 ℃（ASHRAE 2004，第 18.4 页）。因此，如果模拟过程中的实际条件与这些标准条件不符，则由于空气密度的差异，结果将与指定流量不同。
</p>
        <p><span style="font-weight: bold;">
姓名：
</span> 
输入要用于识别气流元件的名称。气流元件将保存在当前项目中，并且可以与多个气流路径关联。
</p>
        <p><span style="font-weight: bold;">
设计（最大）流量：
</span> 
输入最大体积流量。该值可以通过路径调度来修改。
</p>
        <p><span style="font-weight: bold;">
说明：
</span> 
用于输入特定气流元件的更详细描述的字段。
</p>
        <p>&#160;</p>
